{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="text-center mb-5">
    <h2 class="hero-title">Upload New Image</h2>
    <p class="hero-subtitle">Start processing a new image with AI captioning, translation, and speech synthesis.</p>
</div>

<div class="glass-card p-5 mb-5">
    <h4 class="section-title text-center mb-4">Upload New Image</h4>
    <form id="uploadForm" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="drop-zone mb-4" id="dropZone">
            <i class="bi bi-cloud-arrow-up upload-icon"></i>
            <p>Drag & Drop Image or Click to Upload</p>
            <input type="file" name="image" hidden id="fileInput">
            <img id="imagePreview" class="img-fluid mt-3 d-none rounded" style="max-height: 200px;" />
        </div>

        <div class="language-selector mt-4 mb-4">
            <label for="languageSelect" class="form-label text-center d-block mb-3">
                Select Translation Language
            </label>
            <select class="form-select glass-card p-3"
                    id="languageSelect"
                    name="language"
                    style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white;">
                <option value="hi" selected>Hindi</option>
                <option value="te">Telugu</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
                <option value="ar">Arabic</option>
            </select>
        </div>

        <div class="text-center">
            <button type="button" onclick="uploadImage()" class="btn btn-lg glow-btn px-5">
                Generate AI Caption
            </button>

            <div class="progress mt-3 d-none" id="progressBar">
                <div class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar"
                     style="width: 0%"></div>
            </div>
        </div>
    </form>
</div>

<div class="glass-card mt-5 p-4 result-box d-none" id="resultSection">
    <div class="text-center mb-4">
        <img id="resultImage" class="img-fluid rounded" style="max-height: 300px;" />
    </div>

    <h5 class="section-title">Generated Caption</h5>
    <p id="caption" class="result-text"></p>

    <h5 class="section-title mt-4">Translated Text</h5>
    <p id="translation" class="result-text text-info"></p>

    <audio id="audioPlayer" controls class="w-100 mt-4 custom-audio"></audio>

    <div class="mt-3 text-center">
        <button onclick="downloadAudio()" class="btn btn-outline-info btn-sm me-2">
            Download Audio
        </button>
    </div>
</div>

<script>
let dropZone = document.getElementById('dropZone');
let fileInput = document.getElementById('fileInput');

dropZone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener('change', function() {
    let file = this.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('imagePreview').classList.remove('d-none');
        }
        reader.readAsDataURL(file);
    }
});

// ----------------------
// CSRF COOKIE FIX
// ----------------------
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        let cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
// ----------------------

function uploadImage() {
    let formData = new FormData(document.getElementById("uploadForm"));
    let file = fileInput.files[0];

    if (!file) {
        alert('Please select an image first.');
        return;
    }

    let btn = document.querySelector('.glow-btn');
    let progressBar = document.getElementById('progressBar');
    let progress = progressBar.querySelector('.progress-bar');

    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
    btn.disabled = true;
    progressBar.classList.remove('d-none');
    progress.style.width = '0%';

    document.getElementById("resultSection").classList.remove("d-none");

    let reader = new FileReader();
    reader.onload = e => document.getElementById('resultImage').src = e.target.result;
    reader.readAsDataURL(file);

    fetch("/generate/", {
        method: "POST",
        body: formData,
        headers: {
            'X-CSRFToken': getCookie('csrftoken')   // 🔴 PRODUCTION FIX
        }
    })
    .then(res => res.json())
    .then(data => {
        progress.style.width = '100%';
        document.getElementById("caption").innerText = data.caption;
        document.getElementById("translation").innerText = data.translation;
        document.getElementById("audioPlayer").src = data.audio_url;
        btn.innerHTML = 'Generate AI Caption';
        btn.disabled = false;
        progressBar.classList.add('d-none');
    })
    .catch(err => {
        alert('Error: ' + err.message);
        btn.innerHTML = 'Generate AI Caption';
        btn.disabled = false;
        progressBar.classList.add('d-none');
    });
}

function downloadAudio() {
    let audio = document.getElementById('audioPlayer');
    if (audio.src) {
        let a = document.createElement('a');
        a.href = audio.src;
        a.download = 'caption_audio.mp3';
        a.click();
    }
}
</script>

{% endblock %}
