{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="text-center mb-5">
    <h2 class="hero-title">Upload New Image</h2>
    <p class="hero-subtitle">Start processing a new image with AI captioning, translation, and speech synthesis.</p>
</div>

<div class="glass-card p-5 mb-5">
    <h4 class="section-title text-center mb-4">Upload New Image</h4>
    <form id="uploadForm" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Drag Drop -->
        <div class="drop-zone mb-4" id="dropZone">
            <i class="bi bi-cloud-arrow-up upload-icon"></i>
            <p>Drag & Drop Image or Click to Upload</p>
            <input type="file" name="image" hidden id="fileInput">
            <img id="imagePreview" class="img-fluid mt-3 d-none rounded" style="max-height: 200px;" />
        </div>

        <!-- Language Selector -->
        <div class="language-selector mt-4 mb-4">
            <label for="languageSelect" class="form-label text-center d-block mb-3">Select Translation Language</label>
            <select class="form-select glass-card p-3" id="languageSelect" name="language" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white;">
                <option value="hi" selected>Hindi</option>
                <option value="te">Telugu</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
                <option value="ar">Arabic</option>
            </select>
        </div>

        <div class="text-center">
            <button type="button" onclick="uploadImage()" class="btn btn-lg glow-btn px-5">
                Generate AI Caption
            </button>
            <div class="progress mt-3 d-none" id="progressBar">
                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
            </div>
        </div>

    </form>
</div>

<!-- Results Section -->
<div class="glass-card mt-5 p-4 result-box d-none" id="resultSection">
    <div class="text-center mb-4">
        <img id="resultImage" class="img-fluid rounded" style="max-height: 300px;" />
    </div>

    <h5 class="section-title">Generated Caption</h5>
    <p id="caption" class="result-text"></p>

    <h5 class="section-title mt-4">Translated Text</h5>
    <p id="translation" class="result-text text-info"></p>

    <audio id="audioPlayer" controls class="w-100 mt-4 custom-audio"></audio>

    <div class="mt-3 text-center">
        <button onclick="downloadAudio()" class="btn btn-outline-info btn-sm me-2">Download Audio</button>
        <button onclick="shareCaption()" class="btn btn-outline-success btn-sm">Share Caption</button>
    </div>
</div>

<script>
let dropZone = document.getElementById('dropZone');
let fileInput = document.getElementById('fileInput');

dropZone.addEventListener("click", function(){
    fileInput.click();
});

fileInput.addEventListener('change', function() {
    let file = this.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('imagePreview').classList.remove('d-none');
        }
        reader.readAsDataURL(file);
    }
});

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    let files = e.dataTransfer.files;
    if (files.length) {
        fileInput.files = files;
        fileInput.dispatchEvent(new Event('change'));
    }
});

function uploadImage() {
    let formData = new FormData(document.getElementById("uploadForm"));
    let file = fileInput.files[0];
    if (!file) {
        alert('Please select an image first.');
        return;
    }

    let btn = document.querySelector('.glow-btn');
    let progressBar = document.getElementById('progressBar');
    let progress = progressBar.querySelector('.progress-bar');

    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
    btn.disabled = true;
    progressBar.classList.remove('d-none');
    progress.style.width = '0%';

    document.getElementById("resultSection").classList.remove("d-none");

    // Show skeleton
    document.getElementById("caption").innerHTML = '<span class="skeleton skeleton-text w-100 d-inline-block"></span>';
    document.getElementById("translation").innerHTML = '<span class="skeleton skeleton-text w-75 d-inline-block"></span>';

    // Set result image
    let reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('resultImage').src = e.target.result;
    }
    reader.readAsDataURL(file);

    // Simulate progress
    let progressInterval = setInterval(() => {
        let width = parseInt(progress.style.width);
        if (width < 90) {
            progress.style.width = (width + 10) + '%';
        }
    }, 200);

    fetch("/generate/", {
        method: "POST",
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(res => {
        if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
        }
        return res.json();
    })
    .then(data => {
        clearInterval(progressInterval);
        progress.style.width = '100%';
        setTimeout(() => {
            progressBar.classList.add('d-none');
            document.getElementById("caption").innerText = data.caption;
            document.getElementById("translation").innerText = data.translation;
            document.getElementById("audioPlayer").src = data.audio_url;
            btn.innerHTML = 'Generate AI Caption';
            btn.disabled = false;
        }, 500);
    })
    .catch(err => {
        clearInterval(progressInterval);
        progressBar.classList.add('d-none');
        console.error('Upload error:', err);
        alert('Error processing image: ' + err.message);
        btn.innerHTML = 'Generate AI Caption';
        btn.disabled = false;
    });
}

function downloadAudio() {
    let audio = document.getElementById('audioPlayer');
    if (audio.src) {
        let a = document.createElement('a');
        a.href = audio.src;
        a.download = 'caption_audio.mp3';
        a.click();
    } else {
        alert('No audio available to download.');
    }
}

function shareCaption() {
    let caption = document.getElementById('caption').innerText;
    let translation = document.getElementById('translation').innerText;
    let text = `Caption: ${caption}\nTranslation: ${translation}`;
    if (navigator.share) {
        navigator.share({ title: 'AI Generated Caption', text: text });
    } else {
        navigator.clipboard.writeText(text).then(() => alert('Caption copied to clipboard!'));
    }
}
</script>

{% endblock %}
