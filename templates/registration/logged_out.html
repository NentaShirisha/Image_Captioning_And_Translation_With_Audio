{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-5">
    <h1 class="hero-title">See You Later!</h1>
    <p class="hero-subtitle">You have been successfully logged out</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5 text-center">
            <i class="bi bi-check-circle display-1 text-success mb-4"></i>
            <h3 class="section-title mb-3">Logged Out Successfully</h3>
            <p class="result-text mb-4">Thank you for using AI Vision Studio. Your session has been securely ended.</p>

            <a href="{% url 'login' %}" class="btn btn-lg glow-btn px-4">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login Again
            </a>
        </div>
    </div>
</div>

{% endblock %}
